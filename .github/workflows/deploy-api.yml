name: Deploy API

on:
  push:
    branches: [main]
    paths: [api/**, .github/workflows/deploy-api.yml]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build
        working-directory: api
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Install Scaleway CLI
        run: curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sudo sh

      - name: Deploy
        working-directory: api
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORG_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
        run: |
          zip -j function.zip dist/contact.js
          scw function deploy name=contact-form-handler runtime=node22 zip-file=function.zip namespace-id=${{ secrets.SCW_NAMESPACE_ID }} region=fr-par